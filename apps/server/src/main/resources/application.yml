server:
  port: 3000

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/agentforge_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  # Redis
  data:
    redis:
      url: redis://localhost:6379

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration/mysql
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

# 公网访问根 URL（ngrok / 生产域名），用于展示飞书 Webhook 完整地址
app:
  public-base-url: ${PUBLIC_BASE_URL:}

# JWT
jwt:
  secret: ${JWT_SECRET:AgentForge2026SecretKeyForJWTTokenGenerationMustBe256Bits}
  expiration: 86400000

# LLM（讯飞 MaaS：/anthropic → Anthropic 协议；/v2 → OpenAI 协议）
llm:
  base-url: ${LLM_BASE_URL:https://maas-coding-api.cn-huabei-1.xf-yun.com/v2}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:astron-code-latest}

# 飞书 OAuth（浏览器网页登录）
feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  redirect-uri: ${FEISHU_REDIRECT_URI:http://localhost:5173/auth/feishu/callback}
  scope: ${FEISHU_SCOPE:}
  # 事件订阅 Encrypt Key（飞书后台 → 事件与回调）
  encrypt-key: ${FEISHU_ENCRYPT_KEY:}

logging:
  level:
    com.agentforge: DEBUG
